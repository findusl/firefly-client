version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    assignees:
      - findusl
    reviewers:
      - findusl
    open-pull-requests-limit: 10
    ignore:
      # AGP 9.1 supports Gradle up to 9.5.
      - dependency-name: gradle-wrapper
        versions:
          - ">=9.6.0"
      # Stay on AGP 9.1.x until the next toolchain migration is intentional.
      - dependency-name: com.android.tools.build:gradle
        versions:
          - ">=9.2.0-alpha01"
      - dependency-name: com.android.application
        versions:
          - ">=9.2.0-alpha01"
      - dependency-name: com.android.kotlin.multiplatform.library
        versions:
          - ">=9.2.0-alpha01"
      # Ignore the compatibility artifact that regresses to the 0.6 API.
      - dependency-name: org.jetbrains.kotlinx:kotlinx-datetime
        versions:
          - 0.7.1-0.6.x-compat
      # Material3 1.12 alpha breaks the JVM Compose UI tests (CMP-9081).
      - dependency-name: org.jetbrains.compose.material3:material3
        versions:
          - ">=1.12.0-alpha01"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    assignees:
      - findusl
    reviewers:
      - findusl
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    assignees:
      - findusl
    reviewers:
      - findusl
    groups:
      all-dependencies:
        patterns:
          - "*"
