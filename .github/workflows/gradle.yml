name: Kotlin CI with Gradle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Test OpenAPI helper
        run: |
          python -m unittest discover -s tests -p 'test_*.py'
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE/openapi_helper.py" /v1/accounts > /dev/null

      - name: Run baseline checks and build Android and Wasm
        run: ./gradlew checkAgentsEnvironment :androidApp:assembleDebug :composeApp:wasmJsBrowserTest --parallel --console=plain

      - name: Run JVM Compose UI tests
        run: xvfb-run --auto-servernum ./gradlew :composeApp:jvmUiTest --console=plain

      - name: Publish test summary
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: JUnit Tests (Linux)
          path: "**/build/test-results/**/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
          max-annotations: 0
          use-actions-summary: true

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: junit-reports-linux
          path: "**/build/reports/tests/**"
          if-no-files-found: warn

  ios:
    runs-on: macos-26
    env:
      # Kotlin 2.4.10 is tested with Xcode 26.4.
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run iOS simulator tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test --parallel --console=plain

      - name: Build iOS app
        run: >-
          xcodebuild
          -project iosApp/iosApp.xcodeproj
          -scheme iosApp
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build/xcode-derived-data
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Publish test summary
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: JUnit Tests (iOS)
          path: "**/build/test-results/**/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
          max-annotations: 0
          use-actions-summary: true

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: junit-reports-ios
          path: "**/build/reports/tests/**"
          if-no-files-found: warn
